<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beaverhausen Trips</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F7F2E9;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #27424B;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap { width: 100%; max-width: 720px; padding: 0 24px 64px; }

  /* kbach cresting */
  .kbach { display: block; width: 100%; height: 22px; margin: 26px 0 30px; }

  header { text-align: center; margin-bottom: 36px; }
  .eyebrow {
    font-size: 12px; letter-spacing: .24em; text-transform: uppercase;
    color: #2E7D8A; font-weight: 600; margin-bottom: 12px;
  }
  h1 {
    font-family: 'Spectral', serif; font-weight: 600;
    font-size: clamp(34px, 7vw, 50px); line-height: 1.05;
    color: #1F4E5F; margin: 0 0 10px; letter-spacing: -.01em;
  }
  .sub { font-family: 'Spectral', serif; font-style: italic; color: #5E7079; font-size: 17px; }

  .ornament { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 18px 0 4px; color: #C7B888; }
  .ornament .line { width: 48px; height: 1px; background: currentColor; }
  .dia { transform: rotate(45deg); display: inline-block; }

  /* trip card */
  a.trip {
    display: flex; align-items: stretch; gap: 0; text-decoration: none;
    background: #fff; border-radius: 18px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(31,78,95,.05), 0 14px 34px rgba(31,78,95,.07);
    border-left: 5px solid #2E7D8A;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  a.trip:hover { transform: translateY(-3px); box-shadow: 0 1px 2px rgba(31,78,95,.05), 0 20px 44px rgba(31,78,95,.12); }
  .trip .body { padding: 26px 28px; flex: 1; }
  .trip .tag {
    font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
    color: #2E7D8A; font-weight: 600; margin-bottom: 8px;
  }
  .trip h2 {
    font-family: 'Spectral', serif; font-weight: 600; font-size: 27px;
    color: #1F4E5F; margin: 0 0 4px;
  }
  .trip .khmer { font-family: 'Spectral', serif; }
  .trip .meta { font-size: 14px; color: #5E7079; margin-bottom: 14px; }
  .trip .route { font-size: 13px; color: #6B7B81; line-height: 1.5; }
  .trip .go {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 16px;
    font-size: 13px; font-weight: 600; letter-spacing: .03em; color: #2E7D8A;
  }
  .trip .art {
    flex: none; width: 150px; background: #1F4E5F; position: relative; overflow: hidden;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .trip .art svg { width: 100%; height: auto; opacity: .55; }
  @media (max-width: 520px) { .trip .art { display: none; } }

  footer { margin-top: 40px; text-align: center; font-family: 'Spectral', serif; font-style: italic; color: #8A969B; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">

  <svg class="kbach" aria-hidden="true">
    <defs>
      <pattern id="kbach" width="46" height="22" patternUnits="userSpaceOnUse">
        <polygon points="11,2 15.5,11 15.5,18 11,21 6.5,18 6.5,11" fill="#2E7D8A"></polygon>
        <polygon points="34,9 39,15 34,21 29,15" fill="#B8923F"></polygon>
      </pattern>
    </defs>
    <rect width="100%" height="22" fill="url(#kbach)"></rect>
  </svg>

  <header>
    <div class="eyebrow">Beaverhausen Industries</div>
    <h1>Our Trips</h1>
    <div class="sub">A shelf of itineraries &amp; keepsakes</div>
    <div class="ornament">
      <div class="line"></div>
      <span class="dia" style="width:5px;height:5px;background:#B8923F;"></span>
      <span class="dia" style="width:9px;height:9px;background:#1F4E5F;"></span>
      <span class="dia" style="width:5px;height:5px;background:#B8923F;"></span>
      <div class="line"></div>
    </div>
  </header>

  <a class="trip" href="trips/cambodia-adventure.html">
    <div class="body">
      <div class="tag">January 7&ndash;22, 2027 &middot; 15 nights</div>
      <h2>Cambodia Adventure <span class="khmer" style="font-size:18px;color:#2E7D8A;">&#x1797;&#x17d2;&#x1793;&#x17c6;&#x1796;&#x17c1;&#x1789;</span></h2>
      <div class="meta">Anthony &amp; Jenny</div>
      <div class="route">Phnom Penh &rsaquo; Kampot &amp; Kep &rsaquo; Koh Rong Sanloem &rsaquo; Siem Reap &rsaquo; Battambang &rsaquo; Phnom Penh</div>
      <div class="go">Open the itinerary
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg>
      </div>
    </div>
    <div class="art">
      <svg viewBox="0 0 200 120" aria-hidden="true">
        <g fill="#56A0A8">
          <rect x="40" y="104" width="120" height="10"></rect>
          <rect x="30" y="114" width="140" height="4"></rect>
          <rect x="58" y="86" width="84" height="9"></rect>
          <rect x="48" y="95" width="104" height="11"></rect>
          <rect x="62" y="70" width="8" height="16"></rect><polygon points="66,52 70,60 66,66 62,60"></polygon>
          <rect x="130" y="70" width="8" height="16"></rect><polygon points="134,52 138,60 134,66 130,60"></polygon>
          <rect x="94" y="58" width="12" height="28"></rect><polygon points="100,30 105,42 100,50 95,42"></polygon>
        </g>
      </svg>
    </div>
  </a>

  <footer>More to come.</footer>

</div>
</body>
</html>
